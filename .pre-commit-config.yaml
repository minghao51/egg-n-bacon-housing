# Pre-commit hooks for egg-n-bacon-housing

exclude: |
  (?x)^(
    data/|
    app/public/data/|
    app/.astro-cache/|
    htmlcov/|
    output/|
    node_modules/|
    \.venv/|
    src/egg_n_bacon_housing\.egg-info/
  )

repos:
  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: \.devcontainer/
      - id: check-added-large-files
      - id: check-merge-conflict

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Lockfile validation
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.14
    hooks:
      - id: uv-lock

  # Frontend formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.4
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]
        additional_dependencies:
          - prettier@3.4.2

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: package-lock\.json|pnpm-lock\.yaml|uv\.lock

  # Local hooks (venv-dependent)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

      - id: dotenvx-precommit
        name: dotenvx precommit
        entry: dotenvx ext precommit .
        language: system
        pass_filenames: false
        stages: [manual]

      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit --skip-editable
        language: system
        pass_filenames: false
        stages: [manual]
