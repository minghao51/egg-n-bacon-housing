name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev
      - uses: pre-commit/action@v3.0.1

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run mypy src/egg_n_bacon_housing/components src/egg_n_bacon_housing/adapters src/egg_n_bacon_housing/utils/cache.py src/egg_n_bacon_housing/utils/contracts.py src/egg_n_bacon_housing/pipeline.py src/egg_n_bacon_housing/config.py tests

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pip-audit --skip-editable

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Create test environment file
        run: |
          cat > .env << EOF
          ONEMAP_EMAIL=test@example.com
          GOOGLE_API_KEY=test-api-key
          ONEMAP_EMAIL_PASSWORD=test-password
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_KEY=test-key
          JINA_AI=test-jina-key
          LOG_LEVEL=DEBUG
          EOF

      - name: Create test data directories
        run: |
          mkdir -p data/{01_bronze,02_silver,03_gold,04_platinum,cache,manual,analysis}

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=egg_n_bacon_housing --cov-report=xml --cov-report=term-missing:skip-covered

      - name: Enforce core module coverage floor
        run: uv run python scripts/tools/check_core_coverage.py --coverage-xml coverage.xml --min-coverage 60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python-3.12
          path: htmlcov/

      - name: Validate documentation commands and paths
        run: uv run python scripts/tools/validate_docs_layout.py

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./app
        run: bun install

      - name: Install Playwright browsers
        working-directory: ./app
        run: bunx playwright install chromium --with-deps

      - name: Build Astro site
        working-directory: ./app
        run: bun run build

      - name: Run E2E tests
        working-directory: ./app
        run: |
          PLAYWRIGHT_SERVER_COMMAND='bun run preview -- --host 127.0.0.1' \
          PLAYWRIGHT_BASE_URL='http://127.0.0.1:4321' \
          bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
