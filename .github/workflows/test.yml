name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync

    - name: Create test environment file
      run: |
        cat > .env << EOF
        ONEMAP_EMAIL=test@example.com
        GOOGLE_API_KEY=test-api-key
        ONEMAP_EMAIL_PASSWORD=test-password
        SUPABASE_URL=https://test.supabase.co
        SUPABASE_KEY=test-key
        JINA_AI=test-jina-key
        LOG_LEVEL=DEBUG
        EOF

    - name: Create test data directories
      run: |
        mkdir -p data/pipeline/{L0,L1,L2,L3} data/{cache,manual,analysis}

    - name: Run tests with coverage
      run: uv run pytest tests/ -v --tb=short --cov=scripts/core --cov-report=xml --cov-report=term-missing:skip-covered

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-python-3.11
        path: htmlcov/
